kind = "web"
previewPath = "/"
title = "Krypto Knight"
version = "1.0.0"
id = "artifacts/krypto-knight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19182

[services.development]
run = "pnpm --filter @workspace/krypto-knight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/krypto-knight", "run", "build" ]
publicDir = "artifacts/krypto-knight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19182"
BASE_PATH = "/"
